services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  server:
    build: ./server
    env_file: ./server/.env
    environment:
      # Sem DATABASE_NAME: o server cai no fallback SQLite (ver server/config/settings.py).
      # Trocar para Postgres em produção é só definir DATABASE_NAME/USER/PASSWORD/HOST/PORT aqui.
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    depends_on:
      redis:
        condition: service_healthy

  celery:
    build: ./server
    command: python -m celery -A config worker -l info
    env_file: ./server/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./server:/app
    depends_on:
      server:
        condition: service_started
      redis:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules

  extension:
    build: ./extension
    command: sh -c "npm run build && npm run build:firefox"
    volumes:
      - ./extension:/app
      - extension_node_modules:/app/node_modules

volumes:
  client_node_modules:
  extension_node_modules:
